openapi: 3.0.3
info:
  title: ForenseID API
  version: 1.0.0
  description: |
    🛡️ **ForenseID** - Sistema Profesional de Análisis Forense de Identidad
    
    Validación e inteligencia artificial para documentos de identidad mexicanos e internacionales.
    
    ## Características
    - 🔍 **OCR Avanzado**: Extracción de datos de INE, Pasaportes, Cédulas
    - 🤖 **Detección de Alteraciones**: Análisis EXIF, metadatos, patrones digitales
    - 👤 **Biometría Facial**: Detección de rostro y confianza de reconocimiento
    - ✅ **Validación de CURP/RFC**: Validación matemática de dígitos verificadores
    - 🌐 **Cross-Validation**: Coincidencia de datos entre múltiples fuentes
    
    ## Autenticación
    Usa tu **API Key** en uno de estos formatos:
    ```
    X-API-Key: your_api_key_here
    Authorization: Bearer your_api_key_here
    ?api_key=your_api_key_here
    {"api_key": "your_api_key_here"}
    ```
    
    **Demo Key**: `forenseid_demo_key_2026`
  
  contact:
    name: Soporte ForenseID
    email: support@forenseid.mx
    url: https://forenseid.mx
  
  license:
    name: Proprietary
    url: https://forenseid.mx/license

servers:
  - url: http://localhost:4000/api/v1
    description: Desarrollo Local
  - url: https://forenseid-api.vercel.app/api/v1
    description: Producción (Vercel)

tags:
  - name: Autenticación
    description: Gestión de API Keys y tokens
  - name: Documentos
    description: Análisis de documentos de identidad
  - name: Sesiones
    description: Gestión de sesiones de verificación
  - name: Auditoría
    description: Historial y reportes de análisis
  - name: Recursos
    description: Catálogos y tablas de referencia
  - name: Health
    description: Estado del servidor

paths:
  /health:
    get:
      tags:
        - Health
      summary: Verificar estado del servidor
      description: Endpoint público para monitoreo
      operationId: getHealth
      responses:
        '200':
          description: Servidor activo
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: "1.0.0"

  /documents/analyze:
    post:
      tags:
        - Documentos
      summary: Analizar documento de identidad
      description: |
        Envía una imagen de documento (INE, Pasaporte, Cédula) para análisis forense.
        
        **Validaciones incluidas:**
        - OCR con Google Cloud Document AI
        - Detección de alteraciones digitales (EXIF)
        - Validación de CURP/RFC
        - Análisis de biometría facial
        - Detección de espécimen/muestra
        
        **Nota**: Requiere API Key válida
      operationId: analyzeDocument
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
                  description: Imagen del documento (JPEG, PNG, max 5MB)
              required:
                - document
      responses:
        '200':
          description: Análisis completado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: DOCUMENT_ANALYZED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    $ref: '#/components/schemas/DocumentAnalysis'
                  timestamp:
                    type: string
                    format: date-time
                  reportToken:
                    type: string
                    description: JWT del reporte (expira en ~1h)
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /documents/analyze-unified:
    post:
      tags:
        - Documentos
      summary: Análisis unificado (recomendado)
      description: |
        Ejecuta **OCR + Face-API + Google Cloud** en una sola llamada.

        - El campo del archivo debe llamarse `document`.
        - Si una etapa falla (por ejemplo Cloud sin credenciales), el request **no se cae**:
          la etapa se reporta en `data.forensicAnalysis.stages`.
      operationId: analyzeDocumentUnified
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
                  description: Imagen del documento (JPEG, PNG, max 5MB)
              required:
                - document
      responses:
        '200':
          description: Análisis unificado completado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: UNIFIED_ANALYSIS_COMPLETE
                  message:
                    type: string
                  engine:
                    type: string
                    example: Tesseract.js + Face-API + Google Cloud (Unified)
                  request_id:
                    type: string
                  data:
                    $ref: '#/components/schemas/UnifiedDocumentAnalysis'
                  timestamp:
                    type: string
                    format: date-time
                  reportToken:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /documents/analyze-free:
    post:
      tags:
        - Documentos
      summary: Análisis OCR gratuito (Tesseract)
      description: |
        Análisis **100% Open Source** con Tesseract.js.
        Útil para debug o para comparar contra Cloud.
      operationId: analyzeDocumentFree
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
                  description: Imagen del documento (JPEG, PNG, max 5MB)
              required:
                - document
      responses:
        '200':
          description: Análisis OCR completado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: FREE_ANALYSIS_COMPLETE
                  message:
                    type: string
                  engine:
                    type: string
                    example: Tesseract.js OCR (100% GRATUITO - Open Source)
                  request_id:
                    type: string
                  data:
                    $ref: '#/components/schemas/DocumentAnalysis'
                  timestamp:
                    type: string
                    format: date-time
                  reportToken:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /documents/analyze-advanced:
    post:
      tags:
        - Documentos
      summary: Análisis avanzado (OCR + Face-API + Cloudinary)
      description: |
        Pipeline gratuito (dependiendo de configuración) que combina OCR + Face-API + Cloudinary.
      operationId: analyzeDocumentAdvanced
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
                  description: Imagen del documento (JPEG, PNG, max 5MB)
              required:
                - document
      responses:
        '200':
          description: Análisis avanzado completado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: ADVANCED_ANALYSIS_COMPLETE
                  message:
                    type: string
                  engine:
                    type: string
                    example: Tesseract + Face-api.js + Cloudinary (100% GRATUITO)
                  request_id:
                    type: string
                  data:
                    $ref: '#/components/schemas/DocumentAnalysis'
                  timestamp:
                    type: string
                    format: date-time
                  reportToken:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /audits:
    get:
      tags:
        - Auditoría
      summary: Listar historial de análisis
      description: Obtener registro de todos los documentos analizados con filtros
      operationId: listAudits
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          description: Filtrar por veredicto
          schema:
            type: string
            enum: [VERDADERO, FALSO]
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Registros de auditoría
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: AUDITS_RETRIEVED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditRecord'
                  details:
                    type: object
                    properties:
                      pagination:
                        type: object
                        properties:
                          page:
                            type: integer
                          limit:
                            type: integer
                          total:
                            type: integer
                          pages:
                            type: integer
                  timestamp:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /audits/{id}:
    get:
      tags:
        - Auditoría
      summary: Obtener detalles de análisis
      description: Obtener reporte detallado de un análisis específico
      operationId: getAuditDetail
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalles del análisis
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: AUDIT_DETAIL_RETRIEVED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    $ref: '#/components/schemas/AuditRecord'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /sessions:
    post:
      tags:
        - Sesiones
      summary: Crear nueva sesión de verificación
      description: Inicia una nueva sesión de verificación de identidad
      operationId: createSession
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  example: "user_12345"
                durationMinutes:
                  type: integer
                  example: 30
              required:
                - userId
      responses:
        '201':
          description: Sesión creada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: "SESSION_CREATED"
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    $ref: '#/components/schemas/SessionRecord'
                  timestamp:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    get:
      tags:
        - Sesiones
      summary: Listar sesiones
      description: Obtener lista de sesiones con filtros opcionales
      operationId: listSessions
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: userId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, COMPLETED, EXPIRED, CANCELLED]
      responses:
        '200':
          description: Lista de sesiones
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: SESSIONS_RETRIEVED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionRecord'
                  details:
                    type: object
                    properties:
                      pagination:
                        type: object
                  timestamp:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /sessions/{id}:
    get:
      tags:
        - Sesiones
      summary: Obtener detalles de sesión
      description: Obtener información detallada de una sesión específica
      operationId: getSession
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalles de la sesión
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: SESSION_RETRIEVED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    $ref: '#/components/schemas/SessionRecord'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    put:
      tags:
        - Sesiones
      summary: Actualizar sesión
      description: Actualizar estado y datos de una sesión
      operationId: updateSession
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ACTIVE, COMPLETED, EXPIRED, CANCELLED]
                documentId:
                  type: string
                result:
                  type: string
                notes:
                  type: string
      responses:
        '200':
          description: Sesión actualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: SESSION_UPDATED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    $ref: '#/components/schemas/SessionRecord'
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    delete:
      tags:
        - Sesiones
      summary: Cancelar sesión
      description: Cancela una sesión existente
      operationId: deleteSession
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
        - ApiKeyQuery: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sesión cancelada
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: SESSION_CANCELLED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                        example: CANCELLED
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFoundError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /resources/states:
    get:
      tags:
        - Recursos
      summary: Estados mexicanos
      description: Obtener lista de estados mexicanos con códigos de entidad federativa
      operationId: getStates
      responses:
        '200':
          description: Lista de estados
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: STATES_RETRIEVED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          example: "CDMX"
                        name:
                          type: string
                          example: "Ciudad de México"
                  timestamp:
                    type: string
                    format: date-time

  /resources/document-types:
    get:
      tags:
        - Recursos
      summary: Tipos de documentos
      description: Obtener lista de tipos de documentos de identidad válidos
      operationId: getDocumentTypes
      responses:
        '200':
          description: Lista de tipos de documentos
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: DOCUMENT_TYPES_RETRIEVED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          example: "INE"
                        name:
                          type: string
                          example: "Cédula de Identidad (INE)"
                        country:
                          type: string
                          example: "México"
                  timestamp:
                    type: string
                    format: date-time

  /resources/verdicts:
    get:
      tags:
        - Recursos
      summary: Estados de veredicto
      description: Obtener lista de posibles estados de veredicto en análisis forense
      operationId: getVerdicts
      responses:
        '200':
          description: Lista de veredictos
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: VERDICTS_RETRIEVED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          example: "VERDADERO"
                        label:
                          type: string
                          example: "Documento Auténtico"
                        color:
                          type: string
                          example: "emerald"
                        description:
                          type: string
                          example: "El documento pasó todas las validaciones"
                  timestamp:
                    type: string
                    format: date-time

  /resources/error-codes:
    get:
      tags:
        - Recursos
      summary: Diccionario de códigos de error
      description: |
        Referencia completa de todos los códigos de error posibles.
        
        **Parámetros opcionales:**
        - `?category=authentication` - Errores de autenticación
        - `?category=validation` - Errores de validación
        - `?category=processing` - Errores de procesamiento
        - `?category=database` - Errores de base de datos
        - `?category=resource` - Errores de recurso
        - `?category=rate-limit` - Errores de límite de solicitudes
      operationId: getErrorCodes
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [authentication, validation, processing, database, resource, rate-limit]
      responses:
        '200':
          description: Lista de códigos de error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  code:
                    type: string
                    example: ERROR_CODES_RETRIEVED
                  message:
                    type: string
                  request_id:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          example: "AUTH_001"
                        message:
                          type: string
                          example: "API Key inválida o expirada"
                        statusCode:
                          type: integer
                          example: 401
                        category:
                          type: string
                          example: "authentication"
                  timestamp:
                    type: string
                    format: date-time

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API Key como Bearer token
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
      description: API Key en header (usado por el frontend)
    ApiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: API Key como parámetro de query

  schemas:
    DocumentAnalysis:
      type: object
      properties:
        personalInfo:
          $ref: '#/components/schemas/PersonalInfo'
        forensicAnalysis:
          $ref: '#/components/schemas/ForensicAnalysis'

    PersonalInfo:
      type: object
      properties:
        fullName:
          type: string
          example: "EDWIN BENITO"
        idNumber:
          type: string
          example: "CSHRED06042713H600"
        curp:
          type: string
          example: "CAHE060427HHGSRDA0"
        documentType:
          type: string
          example: "CREDENCIAL_INE_MÉXICO"
        extractionConfidence:
          type: number
          format: float
          example: 0.9

    Verdict:
      type: object
      properties:
        status:
          type: string
          enum: [VERDADERO, FALSO, SOSPECHOSO]
        message:
          type: string
        color:
          type: string
          example: emerald

    ForensicAnalysis:
      type: object
      properties:
        faceDetected:
          type: boolean
        isSpecimen:
          type: boolean
        isDigitallyAltered:
          type: boolean
        verdict:
          $ref: '#/components/schemas/Verdict'
      additionalProperties: true

    UnifiedDocumentAnalysis:
      type: object
      properties:
        personalInfo:
          $ref: '#/components/schemas/PersonalInfo'
        forensicAnalysis:
          type: object
          properties:
            faceDetected:
              type: boolean
            faceConfidence:
              type: number
              format: float
              example: 0.93
            isSpecimen:
              type: boolean
            isDigitallyAltered:
              type: boolean
            verdict:
              $ref: '#/components/schemas/Verdict'
            stages:
              type: object
              properties:
                ocr:
                  $ref: '#/components/schemas/StageResult'
                face_api:
                  $ref: '#/components/schemas/StageResult'
                cloud:
                  $ref: '#/components/schemas/StageResult'
        engine:
          type: string
          example: Tesseract.js + Face-API + Google Cloud (Unified)

    StageResult:
      type: object
      properties:
        ok:
          type: boolean
        result:
          type: object
          nullable: true
        error:
          type: object
          nullable: true
          properties:
            code:
              type: string
            message:
              type: string

    AuditRecord:
      type: object
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
        fullName:
          type: string
        documentId:
          type: string
        curp:
          type: string
          nullable: true
        birthDate:
          type: string
          nullable: true
        sex:
          type: string
          nullable: true
